<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scoreboard Pro Ultimate</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0f1218">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0f1218; 
            --card: #1e222d; 
            --accent: #00f2ff; 
            --win: #30d158; 
            --lose: #ff453a; 
            --pwa-bg: #003ab8; 
        }
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* BANNER INSTALL PWA */
        #installBanner {
            display: none; 
            background: var(--pwa-bg);
            color: white;
            padding: 15px;
            margin: 10px;
            border-radius: 12px;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .install-content { display: flex; align-items: center; gap: 12px; }
        .install-icon { font-size: 20px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 10px; }
        .install-btn { 
            background: white; color: var(--pwa-bg); border: none; 
            padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px;
        }

        /* HEADER */
        header { 
            padding: 15px 20px; 
            background: var(--card); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #333;
            z-index: 10;
        }
        .group-title { font-weight: 800; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 18px; }

        /* SIDEBAR / DRAWER */
        #drawer { 
            position: fixed; left: -100%; top: 0; width: 85%; height: 100%; 
            background: #161a23; z-index: 100; transition: 0.3s; padding: 25px 20px; 
            box-shadow: 10px 0 20px rgba(0,0,0,0.5); overflow-y: auto;
        }
        #drawer.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 90; }
        .overlay.open { display: block; }

        /* INPUT AREA */
        .input-section { padding: 15px; display: flex; gap: 8px; background: var(--bg); }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #161a23; color: white; outline: none; font-size: 16px; }
        button.primary { background: var(--accent); color: black; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* PLAYER CARDS */
        #playerList { flex: 1; overflow-y: auto; padding: 10px 15px 30px 15px; }
        .card { 
            background: var(--card); 
            border-radius: 18px; 
            padding: 18px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card.is-checked { opacity: 0.5; border: 1px solid var(--accent); transform: scale(0.97); filter: grayscale(0.5); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .name-area { display: flex; align-items: center; gap: 12px; }
        .checkpoint { width: 24px; height: 24px; cursor: pointer; accent-color: var(--accent); border-radius: 6px; }
        .player-name { font-size: 19px; font-weight: bold; }

        .score-control { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; }
        .score { font-size: 34px; font-weight: 800; min-width: 80px; text-align: center; }
        
        .btn-circle { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-minus { background: rgba(255,69,58,0.1); color: var(--lose); border: 1px solid rgba(255,69,58,0.3); }
        .btn-plus { background: rgba(48,209,88,0.1); color: var(--win); border: 1px solid rgba(48,209,88,0.3); }
        .btn-circle:active { transform: scale(0.9); }

        .bet-box { font-size: 12px; color: #777; margin: 12px 0; display: flex; align-items: center; gap: 8px; }
        .bet-input { width: 70px; background: none; border: none; color: var(--accent); font-weight: bold; border-bottom: 1px solid #444; text-align: center; font-size: 16px; outline: none; }

        .log-area { display: none; margin-top: 10px; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 10px; font-size: 12px; color: #bbb; line-height: 1.6; }
        .text-btn { background: none; border: none; color: #666; font-size: 12px; cursor: pointer; text-decoration: underline; padding: 5px; }

        .drawer-item { padding: 15px; background: #252a36; margin-bottom: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .active-note { border: 2px solid var(--accent); background: #2a354a; }

        .btn-action { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="installBanner">
        <div class="install-content">
            <div class="install-icon"><i class="fas fa-mobile-alt"></i></div>
            <div>
                <strong style="display:block; font-size:14px">Install App Scoreboard</strong>
                <span style="font-size: 11px; opacity: 0.9;">Akses lebih cepat & hemat kuota!</span>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="install-btn" id="btnInstall">Install</button>
            <i class="fas fa-times" style="cursor:pointer" onclick="document.getElementById('installBanner').style.display='none'"></i>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="toggleDrawer()"></div>

    <div id="drawer">
        <h2 style="margin:0 0 20px 0; font-size: 22px;">⚙️ Pengaturan</h2>
        
        <p style="font-size: 12px; color: #666; margin-bottom: 8px;">TAMBAH SESI BARU</p>
        <div class="input-section" style="padding:0 0 25px 0">
            <input type="text" id="newNoteName" placeholder="Contoh: Niko...">
            <button class="primary" onclick="createNewNote()">BUAT</button>
        </div>

        <p style="font-size: 12px; color: #666; margin-bottom: 8px;">DAFTAR SESI</p>
        <div id="noteListContainer"></div>

        <div style="margin-top: 30px;">
            <button class="btn-action" style="background:#25d366; color: black;" onclick="shareAsText()">
                <i class="fas fa-share-alt"></i> SALIN REKAP SKOR (WA)
            </button>
            <button class="btn-action" style="background:#333; color: white;" onclick="exportData()">
                <i class="fas fa-file-export"></i> EXPORT KODE BACKUP
            </button>
            <button class="btn-action" style="background:#333; color: white;" onclick="importData()">
                <i class="fas fa-file-import"></i> IMPORT KODE BACKUP
            </button>
        </div>
        
        <button onclick="toggleDrawer()" style="margin-top:20px; width:100%; padding:15px; background:transparent; border:1px solid #444; border-radius:10px; color:#888">Tutup Menu</button>
    </div>

    <header>
        <div class="group-title" onclick="toggleDrawer()">
            <i class="fas fa-bars"></i> <span id="currentNoteTitle">Utama</span>
        </div>
        <div style="display: flex; gap: 15px;">
            <i class="fas fa-redo-alt" style="color:#555; font-size: 18px; cursor:pointer" onclick="resetCurrent()"></i>
        </div>
    </header>

    <div class="input-section">
        <input type="text" id="playerName" placeholder="Nama Pemain Baru...">
        <button class="primary" onclick="addPlayer()">ADD</button>
    </div>

    <div id="playerList"></div>

<script>
    let allNotes = JSON.parse(localStorage.getItem('MasterNotesDB_V5')) || { "Utama": [] };
    let currentNote = localStorage.getItem('CurrentActiveNote') || "Utama";

    function save() {
        localStorage.setItem('MasterNotesDB_V5', JSON.stringify(allNotes));
        localStorage.setItem('CurrentActiveNote', currentNote);
    }

    function render() {
        document.getElementById('currentNoteTitle').innerText = currentNote;
        const list = document.getElementById('playerList');
        list.innerHTML = '';
        if(!allNotes[currentNote]) currentNote = Object.keys(allNotes)[0];

        allNotes[currentNote].forEach((p, i) => {
            let color = p.score > 0 ? 'var(--win)' : (p.score < 0 ? 'var(--lose)' : 'white');
            list.innerHTML += `
                <div class="card ${p.checked ? 'is-checked' : ''}">
                    <div class="card-header">
                        <div class="name-area">
                            <input type="checkbox" class="checkpoint" ${p.checked ? 'checked' : ''} 
                                   onchange="toggleCheck(${i}, this.checked)">
                            <span class="player-name">${p.name}</span>
                        </div>
                        <button class="text-btn" onclick="deletePlayer(${i})">Hapus</button>
                    </div>

                    <div class="score-control">
                        <button class="btn-circle btn-minus" onclick="changeScore(${i},-1)"><i class="fas fa-minus"></i></button>
                        <span class="score" style="color:${color}">${p.score}</span>
                        <button class="btn-circle btn-plus" onclick="changeScore(${i},1)"><i class="fas fa-plus"></i></button>
                    </div>

                    <div class="bet-box">
                        💰 Nilai Bet: <input type="number" class="bet-input" value="${p.bet}" onchange="allNotes[currentNote][${i}].bet=parseInt(this.value); save()">
                    </div>

                    <button class="text-btn" style="color:#555" onclick="toggleLog(${i})">
                        <i class="fas fa-clock-rotate-left"></i> Lihat Riwayat
                    </button>

                    <div id="log-${i}" class="log-area">
                        ${p.history.slice(0,5).map(h => `<div style="display:flex; justify-content:space-between; margin-bottom:4px"><span>Aksi:</span> <span>${h}</span></div>`).join('') || 'Belum ada data ronde.'}
                    </div>
                </div>
            `;
        });
    }

    function toggleCheck(idx, status) {
        allNotes[currentNote][idx].checked = status;
        checkAutoReset(); save(); render();
    }

    function changeScore(idx, mult) {
        let p = allNotes[currentNote][idx];
        let diff = p.bet * mult;
        p.score += diff;
        p.checked = true; // Tandai pemain sudah diinput
        
        let time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        p.history.unshift(`${diff > 0 ? '+' : ''}${diff} (${time})`);
        
        checkAutoReset(); save(); render();
    }

    // ALGORITMA RESET UNCHECK OTOMATIS
    function checkAutoReset() {
        let players = allNotes[currentNote];
        if (players.length > 0 && players.every(p => p.checked)) {
            setTimeout(() => {
                players.forEach(p => p.checked = false);
                save(); render();
            }, 800);
        }
    }

    function addPlayer() {
        let name = document.getElementById('playerName').value.trim();
        if(name) {
            allNotes[currentNote].push({ name, score: 0, bet: 5, history: [], checked: false });
            document.getElementById('playerName').value = '';
            save(); render();
        }
    }

    function resetCurrent() {
        if(confirm("Reset skor & ronde?")) {
            allNotes[currentNote].forEach(p => { p.score = 0; p.history = []; p.checked = false; });
            save(); render();
        }
    }

    function deletePlayer(idx) {
        if(confirm('Hapus pemain ini?')) {
            allNotes[currentNote].splice(idx,1);
            save(); render();
        }
    }

    function toggleLog(i) {
        let el = document.getElementById('log-'+i);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
        renderNoteList();
    }

    function renderNoteList() {
        const container = document.getElementById('noteListContainer');
        container.innerHTML = '';
        Object.keys(allNotes).forEach(name => {
            container.innerHTML += `
                <div class="drawer-item ${name === currentNote ? 'active-note' : ''}" onclick="currentNote='${name}'; save(); toggleDrawer(); render();">
                    <span style="font-weight:bold">${name}</span>
                    <i class="fas fa-trash-alt" style="color:#ff453a; padding:10px; cursor:pointer" onclick="event.stopPropagation(); deleteNote('${name}')"></i>
                </div>
            `;
        });
    }

    function deleteNote(name) {
        if(Object.keys(allNotes).length > 1 && confirm(`Hapus sesi ${name}?`)) {
            delete allNotes[name];
            if(currentNote === name) currentNote = Object.keys(allNotes)[0];
            save(); renderNoteList(); render();
        }
    }

    function createNewNote() {
        let name = document.getElementById('newNoteName').value.trim();
        if(name && !allNotes[name]) {
            allNotes[name] = []; document.getElementById('newNoteName').value = '';
            currentNote = name; save(); toggleDrawer(); render();
        }
    }

    function shareAsText() {
        let text = `🏆 *LAPORAN SKOR: ${currentNote.toUpperCase()}*\n`;
        text += `📅 _${new Date().toLocaleDateString('id-ID')}_\n\n`;
        [...allNotes[currentNote]].sort((a,b)=>b.score-a.score).forEach((p,i)=>{
            text += `${i+1}. *${p.name}*: ${p.score >= 0 ? '+' : ''}${p.score}\n`;
        });
        navigator.clipboard.writeText(text).then(()=>alert("Rekap Teks Berhasil Disalin ke WA!"));
    }

    function exportData() {
        navigator.clipboard.writeText(btoa(JSON.stringify(allNotes))).then(()=>alert("Kode Backup Disalin!"));
    }

    function importData() {
        let code = prompt("Paste Kode Backup:");
        if(code) { try { allNotes = JSON.parse(atob(code)); save(); location.reload(); } catch(e){ alert("Gagal Import!"); } }
    }

    // LOGIKA PWA INSTALLER
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBanner').style.display = 'flex';
    });

    document.getElementById('btnInstall').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('installBanner').style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    render();
</script>
</body>
</html>
